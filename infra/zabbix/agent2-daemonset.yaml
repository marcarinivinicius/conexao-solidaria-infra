apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zabbix-agent2
  namespace: conexao-solidaria
spec:
  selector:
    matchLabels:
      app: zabbix-agent2
  template:
    metadata:
      labels:
        app: zabbix-agent2
    spec:
      containers:
        - name: zabbix-agent2
          image: zabbix/zabbix-agent2:alpine-6.4-latest
          ports:
            - containerPort: 10050
          env:
            - name: ZBX_HOSTNAME
              value: zabbix-agent2
            - name: ZBX_SERVER_HOST
              value: zabbix-server
          # O plugin Docker do agent2 (CPU/memoria por container via
          # /var/run/docker.sock) foi removido daqui: testado ao vivo no
          # driver docker do minikube e o node nao expõe o socket como um
          # arquivo real (kubelet rejeita o hostPath com "is not a file"),
          # o que travava o pod inteiro (nem as metricas HTTP via plugin
          # Prometheus rodavam). CPU/memoria por pod fica por conta de
          # `kubectl top pods` no video de demonstracao; as metricas HTTP
          # (prometheus.data) continuam funcionando normalmente por aqui.
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-agent2
  namespace: conexao-solidaria
spec:
  selector:
    app: zabbix-agent2
  ports:
    - port: 10050
      targetPort: 10050
