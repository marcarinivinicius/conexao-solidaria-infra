          "datasource": { "type": "alexanderzobnin-zabbix-datasource", "uid": "Zabbix" },
          "targets": [
            {
              "refId": "A", "queryType": 0,
              "group": { "filter": "Conexao Solidaria" }, "host": { "filter": "campaign-api" },
