# Nao mexe no argocd-server oficial do install.yaml, so adiciona uma
# rota de entrada. argocd-server serve TLS na porta 443 mesmo internamente
# (self-signed), por isso o backend-protocol HTTPS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  rules:
    - host: argocd.conexao-solidaria.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443
