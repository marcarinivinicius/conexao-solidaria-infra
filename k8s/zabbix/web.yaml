apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: conexao-solidaria
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:alpine-6.4-latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_SERVER_HOST
              value: postgres
            - name: POSTGRES_USER
              value: zabbix
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: ZABBIX_POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: zabbix
            - name: ZBX_SERVER_HOST
              value: zabbix-server
            - name: PHP_TZ
              value: America/Sao_Paulo
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-web
  namespace: conexao-solidaria
spec:
  selector:
    app: zabbix-web
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort
