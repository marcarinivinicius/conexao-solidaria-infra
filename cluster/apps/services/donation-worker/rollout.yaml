apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: conexao-solidaria-donation-worker
  namespace: conexao-solidaria
  labels:
    app: conexao-solidaria-donation-worker
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: conexao-solidaria-donation-worker
  template:
    metadata:
      labels:
        app: conexao-solidaria-donation-worker
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: donation-worker
          image: ghcr.io/marcarinivinicius/conexao-solidaria-donation-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: donation-worker-secrets
                  key: POSTGRES_CONNECTION_STRING
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: donation-worker-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: donation-worker-secrets
                  key: RABBITMQ_PASSWORD
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
  # Sem trafficRouting: o worker so consome fila, nao recebe trafego HTTP
  # externo pra dividir por Ingress. O canary aqui e "por replica" - o
  # controller aproxima o peso de cada step escalando quantos pods novos
  # vs antigos ficam de pe (com replicas: 3, setWeight: 33 ~= 1 pod novo).
  strategy:
    canary:
      steps:
        - setWeight: 33
        - pause: { duration: 30s }
        - setWeight: 66
        - pause: { duration: 30s }
        - setWeight: 100
