apiVersion: v1
kind: Secret
metadata:
  name: campaign-api-secrets
  namespace: conexao-solidaria
type: Opaque
stringData:
  # Defaults de desenvolvimento/hackathon - troque via `kubectl apply` com
  # seus proprios valores (ou um SealedSecret) antes de ir pra produção.
  POSTGRES_CONNECTION_STRING: "Host=postgres;Port=5432;Database=conexaosolidaria;Username=conexaosolidaria;Password=conexaosolidaria"
  RABBITMQ_USERNAME: "conexaosolidaria"
  RABBITMQ_PASSWORD: "conexaosolidaria"
  JWT_SECRET_KEY: "troque-esta-chave-em-producao-usando-variavel-de-ambiente-Jwt__SecretKey"
