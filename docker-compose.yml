name: conexao-solidaria-infra

networks:
  conexao-solidaria-net:
    name: conexao-solidaria-net

volumes:
  postgres-data:
  grafana-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: conexaosolidaria
      POSTGRES_PASSWORD: conexaosolidaria
      POSTGRES_DB: conexaosolidaria
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conexaosolidaria"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [conexao-solidaria-net]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: conexaosolidaria
      RABBITMQ_DEFAULT_PASS: conexaosolidaria
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [conexao-solidaria-net]

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-6.4-latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    ports:
      - "10051:10051"
    networks: [conexao-solidaria-net]

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-6.4-latest
    restart: unless-stopped
    depends_on:
      - zabbix-server
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Sao_Paulo
    ports:
      - "8080:8080" # Zabbix web UI (login padrao: Admin / zabbix)
    networks: [conexao-solidaria-net]

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    depends_on:
      - zabbix-web
    environment:
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      ZABBIX_URL: http://zabbix-web:8080
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [conexao-solidaria-net]
